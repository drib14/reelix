# ===================================================
# Render Infrastructure as Code Blueprint Specification
# Project: Reelix Fullstack (Frontend & Backend API)
# ===================================================

services:
  # ---------------------------------------------------
  # 1. Fullstack / Backend Web Service (Node.js API + Static Client)
  # ---------------------------------------------------
  - type: web
    name: reelix-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --include=dev --no-audit --no-fund && cd frontend && npm install --include=dev --no-audit --no-fund && npm run build
    startCommand: node backend/index.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_READ_ACCESS_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CLIENT_URL
        sync: false

  # ---------------------------------------------------
  # 2. Frontend Static Site (Vite React Web App)
  # ---------------------------------------------------
  - type: web
    name: reelix-web
    runtime: static
    buildCommand: cd frontend && npm install --include=dev --no-audit --no-fund && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BASE_URL
        value: https://reelix-api.onrender.com
