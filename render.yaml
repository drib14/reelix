# ===================================================
# Render Infrastructure as Code Blueprint Specification
# Project: Reelix Fullstack (Frontend & Backend API)
# ===================================================

services:
  # ---------------------------------------------------
  # 1. Backend Web Service (Node.js Express API)
  # ---------------------------------------------------
  - type: web
    name: reelix-api
    env: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/v1/movies
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_READ_ACCESS_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CLIENT_URL
        fromService:
          type: web
          name: reelix
          property: url

  # ---------------------------------------------------
  # 2. Frontend Static Site (Vite React Web App)
  # Name: reelix (fallback: reelix-web if claimed)
  # ---------------------------------------------------
  - type: web
    name: reelix
    env: static
    plan: free
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BASE_URL
        fromService:
          type: web
          name: reelix-api
          property: url
      - key: VITE_AI_API_URL
        fromService:
          type: web
          name: reelix-api
          property: url
          path: /api/v1/ai/chat
